name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run pyright
      - run: uv run mypy src/sqlproof/
      - run: uv run pytest --cov=sqlproof --cov-fail-under=95 --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          # Codecov v4 requires a token on protected branches even for
          # public repos. Get the token from
          # https://app.codecov.io/gh/alialavia/sqlproof/config/general
          # and add as repo secret CODECOV_TOKEN.
          token: ${{ secrets.CODECOV_TOKEN }}

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website
