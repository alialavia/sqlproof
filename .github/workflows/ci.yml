name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    services:
      postgres:
        # Supabase's Postgres image bundles plpgsql_check, pgvector,
        # pgsodium, pgjwt, etc., and creates the `auth` schema with
        # `auth.uid()` / `auth.jwt()` helpers on first boot. This lets
        # the plpgsql_coverage and (future) RLS-helper integration tests
        # run against a realistic Supabase-shaped database.
        image: supabase/postgres:15.8.1.040
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
    env:
      SQLPROOF_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Bring Postgres surface into lockstep with managed Supabase
        run: |
          # plpgsql_check is shipped with the image but not pre-installed
          # in the default database. The plpgsql_coverage integration
          # tests skip unless it's in pg_extension, so create it once.
          psql "$SQLPROOF_TEST_DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS plpgsql_check;"

          # The bare `supabase/postgres` image's `auth.uid()` / `.role()` /
          # `.email()` only read the legacy singular `request.jwt.claim.*`
          # GUCs. Managed Supabase replaces them at deploy time via GoTrue
          # migration `20220224000811_update_auth_functions.up.sql`, which
          # adds JSON-aware versions that coalesce singular GUCs with the
          # modern `request.jwt.claims` JSON GUC that PostgREST 8+ sets.
          # Apply the same migration here so CI auth surface matches
          # production semantics.
          # Source: https://github.com/supabase/auth/blob/master/migrations/20220224000811_update_auth_functions.up.sql
          psql -v ON_ERROR_STOP=1 "$SQLPROOF_TEST_DATABASE_URL" <<'SQL'
          CREATE OR REPLACE FUNCTION auth.uid()
          RETURNS uuid LANGUAGE sql STABLE AS $$
            SELECT COALESCE(
              NULLIF(current_setting('request.jwt.claim.sub', true), ''),
              (NULLIF(current_setting('request.jwt.claims', true), '')::jsonb ->> 'sub')
            )::uuid
          $$;

          CREATE OR REPLACE FUNCTION auth.role()
          RETURNS text LANGUAGE sql STABLE AS $$
            SELECT COALESCE(
              NULLIF(current_setting('request.jwt.claim.role', true), ''),
              (NULLIF(current_setting('request.jwt.claims', true), '')::jsonb ->> 'role')
            )::text
          $$;

          CREATE OR REPLACE FUNCTION auth.email()
          RETURNS text LANGUAGE sql STABLE AS $$
            SELECT COALESCE(
              NULLIF(current_setting('request.jwt.claim.email', true), ''),
              (NULLIF(current_setting('request.jwt.claims', true), '')::jsonb ->> 'email')
            )::text
          $$;

          CREATE OR REPLACE FUNCTION auth.jwt()
          RETURNS jsonb LANGUAGE sql STABLE AS $$
            SELECT COALESCE(
              NULLIF(current_setting('request.jwt.claim', true), ''),
              NULLIF(current_setting('request.jwt.claims', true), '')
            )::jsonb
          $$;
          SQL

          psql "$SQLPROOF_TEST_DATABASE_URL" -c "SELECT extname, extversion FROM pg_extension ORDER BY extname;"
          psql "$SQLPROOF_TEST_DATABASE_URL" -c "SELECT n.nspname, p.proname FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace WHERE n.nspname = 'auth' ORDER BY proname;"
      - run: uv run ruff check src/ tests/
      - run: uv run pyright
      - run: uv run mypy src/sqlproof/
      - run: uv run pytest --cov=sqlproof --cov-fail-under=94 --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          # Codecov v4 requires a token on protected branches even for
          # public repos. Get the token from
          # https://app.codecov.io/gh/alialavia/sqlproof/config/general
          # and add as repo secret CODECOV_TOKEN.
          token: ${{ secrets.CODECOV_TOKEN }}

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website
